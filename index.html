<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>一个人练步伐 (有音频)</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: #f5f5f7;
      color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      width: 90%;
      max-width: 620px;
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 { margin-top: 0; font-size: 28px; }
    .phrase {
      font-size: 56px;
      font-weight: bold;
      margin: 18px 0 8px;
      min-height: 72px;
    }
    .image {
      font-size: 120px;
      line-height: 1;
      min-height: 140px;
      margin: 8px 0 18px;
    }
    .controls {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 18px;
      text-align: left;
    }
    .section {
      border: 1px solid #e5e5ea;
      border-radius: 14px;
      padding: 14px;
      background: #fafafa;
    }
    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .row > div {
      flex: 1;
      min-width: 140px;
    }
    label {
      font-size: 16px;
      display: block;
      margin-bottom: 8px;
    }
    input[type="number"] {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      border: 1px solid #ccc;
      border-radius: 12px;
      box-sizing: border-box;
      background: white;
    }
    .radio-line {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 18px;
    }
    .radio-line input[type="radio"] {
      transform: scale(1.2);
    }
    button {
      padding: 14px 18px;
      font-size: 20px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      width: 100%;
    }
    .start-btn { background: #007aff; color: white; }
    .stop-btn { background: #ff3b30; color: white; }
    .back-btn { background: #8e8e93; color: white; }
    .mode-btn { background: #007aff; color: white; margin-top: 14px; }
    .disabled-btn { background: #d1d1d6; color: #777; margin-top: 14px; cursor: not-allowed; }
    .status { margin-top: 18px; font-size: 16px; color: #666; min-height: 24px; }
    .hidden { display: none; }
    .subtitle {
      font-size: 16px;
      color: #666;
      margin: 8px 0 20px;
      line-height: 1.5;
    }
    .mode-card {
      border: 1px solid #e5e5ea;
      border-radius: 16px;
      padding: 16px;
      background: #fafafa;
      text-align: left;
      margin-top: 14px;
    }
    .mode-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .mode-desc {
      font-size: 15px;
      color: #666;
      line-height: 1.45;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- 首页：模式选择 -->
    <div id="homePage">
      <h1>一个人练步伐</h1>
      <div class="subtitle">请选择训练模式</div>

      <div class="mode-card">
        <div class="mode-title">1：四方向随机提示</div>
        <div class="mode-desc">随机输出左前、右前、左后、右后，并播放对应语音。</div>
        <button class="mode-btn" id="enterMode1Btn">进入训练</button>
      </div>

      <div class="mode-card">
        <div class="mode-title">2：待开发</div>
        <div class="mode-desc">这里预留给未来添加其他训练模式。</div>
        <button class="disabled-btn" disabled>暂未开放</button>
      </div>
    </div>

    <!-- 模式1：保留原稳定逻辑 -->
    <div id="mode1Page" class="hidden">
      <h1>四方向随机提示</h1>
      <div id="phrase" class="phrase">准备开始</div>
      <div id="image" class="image">⬤</div>

      <div class="controls">
        <div class="section">
          <div class="radio-line">
            <input type="radio" id="modeFixed" name="mode" value="fixed" checked />
            <label for="modeFixed" style="margin:0;">固定间隔</label>
          </div>
          <div id="fixedSection">
            <label for="fixedInterval">固定间隔（秒）, 需大于1</label>
            <input id="fixedInterval" type="number" min="0.5" step="0.5" value="2" />
          </div>
        </div>

        <div class="section">
          <div class="radio-line">
            <input type="radio" id="modeRandom" name="mode" value="random" />
            <label for="modeRandom" style="margin:0;">随机间隔 (Steven建议2-4秒)</label>
          </div>
          <div id="randomSection" class="hidden">
            <div class="row">
              <div>
                <label for="minInterval">下限（秒）, 需大于1</label>
                <input id="minInterval" type="number" min="0.5" step="0.5" value="2" />
              </div>
              <div>
                <label for="maxInterval">上限（秒）</label>
                <input id="maxInterval" type="number" min="0.5" step="0.5" value="4" />
              </div>
            </div>
          </div>
        </div>

        <button class="start-btn" id="startBtn">开始</button>
        <button class="stop-btn" id="stopBtn">停止</button>
        <button class="back-btn" id="backHomeBtn">返回首页</button>
      </div>

      <div id="status" class="status">未运行</div>
      <div style="font-size:14px;color:#999;margin-top:6px;">
        若无声音，请关闭手机静音模式 🔇
      </div>
    </div>
  </div>

  <script>
  // ===== 新增：模式配置 =====
  const modeConfigs = {
    mode1: {
      title: "四方向随机提示",
      items: [
        { label: "左前", file: "zuoqian.mp3", icon: "↖" },
        { label: "右前", file: "youqian.mp3", icon: "↗" },
        { label: "左后", file: "zuohou.mp3", icon: "↙" },
        { label: "右后", file: "youhou.mp3", icon: "↘" }
      ]
    }

    // 以后加模式时，在这里继续加：
    // mode2: {
    //   title: "两方向随机提示",
    //   items: [
    //     { label: "左", file: "left.mp3", icon: "←" },
    //     { label: "右", file: "right.mp3", icon: "→" }
    //   ]
    // }
  };

  let currentMode = "mode1";
  let currentItems = modeConfigs[currentMode].items;

  // ===== 页面切换，只影响UI，不改核心训练逻辑 =====
  const homePageEl = document.getElementById("homePage");
  const mode1PageEl = document.getElementById("mode1Page");

  function enterMode1Page() {
    currentMode = "mode1";
    currentItems = modeConfigs[currentMode].items;

    // 切换模式时重置状态，避免之后新增模式时音频缓存混用
    buffers = {};
    lastIndex = -1;

    homePageEl.classList.add("hidden");
    mode1PageEl.classList.remove("hidden");
  }

  function goHomePage() {
    stopPrompt(true);
    mode1PageEl.classList.add("hidden");
    homePageEl.classList.remove("hidden");
  }

  document.getElementById("enterMode1Btn").addEventListener("click", enterMode1Page);
  document.getElementById("backHomeBtn").addEventListener("click", goHomePage);

  // ===== 以下为原稳定版核心逻辑，基本保持不变 =====
  const phraseEl = document.getElementById("phrase");
  const imageEl = document.getElementById("image");
  const statusEl = document.getElementById("status");

  const modeFixedEl = document.getElementById("modeFixed");
  const modeRandomEl = document.getElementById("modeRandom");
  const fixedSectionEl = document.getElementById("fixedSection");
  const randomSectionEl = document.getElementById("randomSection");

  const fixedIntervalEl = document.getElementById("fixedInterval");
  const minIntervalEl = document.getElementById("minInterval");
  const maxIntervalEl = document.getElementById("maxInterval");

  let audioCtx = null;
  let audioUnlocked = false;
  let buffers = {};
  let running = false;
  let timer = null;
  let lastIndex = -1;
  let currentSource = null;

  function setStatus(msg) {
    statusEl.textContent = msg;
  }

  function updateModeUI() {
    const isFixed = modeFixedEl.checked;
    fixedSectionEl.classList.toggle("hidden", !isFixed);
    randomSectionEl.classList.toggle("hidden", isFixed);
  }

  function chooseNextItem() {
    let idx;
    do {
      idx = Math.floor(Math.random() * currentItems.length);
    } while (currentItems.length > 1 && idx === lastIndex);
    lastIndex = idx;
    return currentItems[idx];
  }

  async function ensureAudioContext() {
    if (!audioCtx) {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) {
        throw new Error("当前浏览器不支持 Web Audio API");
      }
      audioCtx = new Ctx();
    }
    if (audioCtx.state !== "running") {
      await audioCtx.resume();
    }
  }

  async function unlockAudio() {
    await ensureAudioContext();
    const buffer = audioCtx.createBuffer(1, 1, 22050);
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(audioCtx.destination);
    source.start(0);
    audioUnlocked = true;
  }

  async function loadOneFile(file) {
    const resp = await fetch(file, { cache: "force-cache" });
    if (!resp.ok) {
      throw new Error(`加载失败: ${file}`);
    }
    const arr = await resp.arrayBuffer();
    return await audioCtx.decodeAudioData(arr.slice(0));
  }

  async function preloadAllAudio() {
    await ensureAudioContext();
    setStatus("正在加载音频...");

    for (const item of currentItems) {
      buffers[item.label] = await loadOneFile(item.file);
    }

    setStatus("音频已加载，准备开始");
  }

  function stopCurrentSource() {
    if (currentSource) {
      try { currentSource.stop(0); } catch (e) {}
      try { currentSource.disconnect(); } catch (e) {}
      currentSource = null;
    }
  }

  function playBuffer(label) {
    const buffer = buffers[label];
    if (!buffer) throw new Error(`未找到音频缓冲: ${label}`);

    stopCurrentSource();

    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(audioCtx.destination);
    source.start(0);
    currentSource = source;

    source.onended = () => {
      if (currentSource === source) {
        currentSource.disconnect();
        currentSource = null;
      }
    };
  }

  function getNextDelayMs() {
    if (modeFixedEl.checked) {
      const fixed = parseFloat(fixedIntervalEl.value);
      if (isNaN(fixed) || fixed <= 1) {
        throw new Error("固定间隔必须大于 1");
      }
      return fixed * 1000;
    } else {
      const min = parseFloat(minIntervalEl.value);
      const max = parseFloat(maxIntervalEl.value);
      if (isNaN(min) || isNaN(max) || min <= 1 || max <= 1) {
        throw new Error("随机区间上下限必须大于 1");
      }
      if (min > max) {
        throw new Error("随机区间下限不能大于上限");
      }
      return (min + Math.random() * (max - min)) * 1000;
    }
  }

  async function runOnce() {
    if (!running) return;

    try {
      await ensureAudioContext();

      const item = chooseNextItem();
      phraseEl.textContent = item.label;
      imageEl.textContent = item.icon || "";

      playBuffer(item.label);

      const nextDelayMs = getNextDelayMs();
      const nextDelaySec = (nextDelayMs / 1000).toFixed(2);

      if (modeFixedEl.checked) {
        setStatus(`运行中：固定间隔 ${nextDelaySec} 秒`);
      } else {
        const min = parseFloat(minIntervalEl.value);
        const max = parseFloat(maxIntervalEl.value);
        setStatus(`运行中：随机间隔 ${min}–${max} 秒，本次下一条约 ${nextDelaySec} 秒后`);
      }

      timer = setTimeout(runOnce, nextDelayMs);
    } catch (err) {
      console.error(err);
      setStatus(err.message || "播放音频失败：请刷新页面后再次点击开始");
      stopPrompt(false);
    }
  }

  async function startPrompt() {
    try {
      stopPrompt(false);
      setStatus("启动中...");

      await ensureAudioContext();

      if (!audioUnlocked) {
        await unlockAudio();
      }

      if (Object.keys(buffers).length === 0) {
        await preloadAllAudio();
      }

      running = true;
      await runOnce();
    } catch (err) {
      console.error(err);
      setStatus("启动失败：请确认音频文件存在且参数填写正确");
    }
  }

  function stopPrompt(updateStatus = true) {
    running = false;
    if (timer) {
      clearTimeout(timer);
      timer = null;
    }
    stopCurrentSource();
    if (updateStatus) setStatus("已停止");
  }

  modeFixedEl.addEventListener("change", updateModeUI);
  modeRandomEl.addEventListener("change", updateModeUI);

  document.getElementById("startBtn").addEventListener("click", startPrompt);
  document.getElementById("stopBtn").addEventListener("click", () => stopPrompt(true));

  document.addEventListener("visibilitychange", async () => {
    if (document.hidden) {
      stopPrompt(true);
    } else if (audioCtx && audioCtx.state !== "running") {
      try { await audioCtx.resume(); } catch (e) {}
    }
  });

  updateModeUI();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>随机方位提示（稳定版）</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: #f5f5f7;
      color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      width: 90%;
      max-width: 560px;
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
    }
    .phrase {
      font-size: 56px;
      font-weight: bold;
      margin: 20px 0 8px;
      min-height: 72px;
    }
    .image {
      font-size: 120px;
      line-height: 1;
      min-height: 140px;
      margin: 10px 0 20px;
    }
    .controls {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 20px;
    }
    label {
      font-size: 18px;
      display: block;
      margin-bottom: 8px;
      text-align: left;
    }
    input {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      border: 1px solid #ccc;
      border-radius: 12px;
      box-sizing: border-box;
    }
    button {
      padding: 14px 18px;
      font-size: 20px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
    }
    .start-btn {
      background: #007aff;
      color: white;
    }
    .stop-btn {
      background: #ff3b30;
      color: white;
    }
    .status {
      margin-top: 18px;
      font-size: 16px;
      color: #666;
      min-height: 24px;
    }
    .tip {
      margin-top: 8px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>随机方位提示（稳定版）</h1>
    <div id="phrase" class="phrase">准备开始</div>
    <div id="image" class="image">⬤</div>

    <div class="controls">
      <div>
        <label for="interval">每次输出间隔（秒）</label>
        <input id="interval" type="number" min="0.5" step="0.5" value="2" />
      </div>

      <button class="start-btn" id="startBtn">开始</button>
      <button class="stop-btn" id="stopBtn">停止</button>
    </div>

    <div id="status" class="status">未运行</div>
    <div class="tip">请把本文件和 4 个音频放在同一文件夹：zuoqian.mp3 / youqian.mp3 / zuohou.mp3 / youhou.mp3</div>
  </div>

  <script>
    const items = [
      { label: "左前", audio: "zuoqian.mp3", icon: "↖" },
      { label: "右前", audio: "youqian.mp3", icon: "↗" },
      { label: "左后", audio: "zuohou.mp3", icon: "↙" },
      { label: "右后", audio: "youhou.mp3", icon: "↘" }
    ];

    const phraseEl = document.getElementById("phrase");
    const imageEl = document.getElementById("image");
    const statusEl = document.getElementById("status");
    const intervalEl = document.getElementById("interval");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");

    let currentAudio = null;
    let isRunning = false;
    let pendingTimer = null;
    let lastIndex = -1;

    // 预加载并复用音频对象，避免反复 new Audio() 导致 Safari/移动端失稳
    const audioPool = {};
    items.forEach(item => {
      const a = new Audio(item.audio);
      a.preload = "auto";
      audioPool[item.label] = a;
    });

    function chooseNextItem() {
      if (items.length === 1) return items[0];
      let idx;
      do {
        idx = Math.floor(Math.random() * items.length);
      } while (idx === lastIndex);
      lastIndex = idx;
      return items[idx];
    }

    function clearPending() {
      if (pendingTimer) {
        clearTimeout(pendingTimer);
        pendingTimer = null;
      }
    }

    function stopCurrentAudio() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }
    }

    function scheduleNext(delayMs) {
      clearPending();
      if (!isRunning) return;
      pendingTimer = setTimeout(() => {
        runCycle();
      }, delayMs);
    }

    function runCycle() {
      if (!isRunning) return;

      const item = chooseNextItem();
      phraseEl.textContent = item.label;
      imageEl.textContent = item.icon;

      stopCurrentAudio();
      currentAudio = audioPool[item.label];
      currentAudio.currentTime = 0;

      const intervalSeconds = parseFloat(intervalEl.value);
      const gapMs = (!isNaN(intervalSeconds) && intervalSeconds > 0) ? intervalSeconds * 1000 : 2000;

      const playPromise = currentAudio.play();

      if (playPromise !== undefined) {
        playPromise.then(() => {
          statusEl.textContent = `运行中：每 ${intervalSeconds || 2} 秒输出一次`;
          const durationMs = isFinite(currentAudio.duration) && currentAudio.duration > 0
            ? currentAudio.duration * 1000
            : 800;
          // 下一轮在“音频结束 + 用户设定间隔”后再开始，更稳
          scheduleNext(durationMs + gapMs);
        }).catch(err => {
          console.error(err);
          statusEl.textContent = "音频播放失败：请先手动点一次开始，并确认音频文件存在";
          // 失败时仍按设定时间继续尝试
          scheduleNext(gapMs);
        });
      } else {
        scheduleNext(gapMs + 800);
      }
    }

    function startPrompt() {
      const intervalSeconds = parseFloat(intervalEl.value);
      if (isNaN(intervalSeconds) || intervalSeconds <= 0) {
        alert("请输入大于 0 的时间间隔");
        return;
      }

      stopPrompt(false);
      isRunning = true;
      statusEl.textContent = "启动中...";
      runCycle();
    }

    function stopPrompt(updateStatus = true) {
      isRunning = false;
      clearPending();
      stopCurrentAudio();
      if (updateStatus) {
        statusEl.textContent = "已停止";
      }
    }

    startBtn.addEventListener("click", startPrompt);
    stopBtn.addEventListener("click", () => stopPrompt(true));

    // 页面切到后台时停止，避免移动端音频状态错乱
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        stopPrompt(true);
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>随机方位提示（iPhone更稳版）</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: #f5f5f7;
      color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      width: 90%;
      max-width: 560px;
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 { margin-top: 0; font-size: 28px; }
    .phrase {
      font-size: 56px;
      font-weight: bold;
      margin: 18px 0 8px;
      min-height: 72px;
    }
    .image {
      font-size: 120px;
      line-height: 1;
      min-height: 140px;
      margin: 8px 0 18px;
    }
    .controls {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 18px;
    }
    label {
      font-size: 18px;
      display: block;
      margin-bottom: 8px;
      text-align: left;
    }
    input {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      border: 1px solid #ccc;
      border-radius: 12px;
      box-sizing: border-box;
    }
    button {
      padding: 14px 18px;
      font-size: 20px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
    }
    .start-btn { background: #007aff; color: white; }
    .stop-btn { background: #ff3b30; color: white; }
    .status { margin-top: 18px; font-size: 16px; color: #666; min-height: 24px; }
    .tip { margin-top: 8px; font-size: 14px; color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <h1>随机方位提示</h1>
    <div id="phrase" class="phrase">准备开始</div>
    <div id="image" class="image">⬤</div>

    <div class="controls">
      <div>
        <label for="interval">每次输出间隔（秒）</label>
        <input id="interval" type="number" min="0.5" step="0.5" value="2" />
      </div>

      <button class="start-btn" id="startBtn">开始</button>
      <button class="stop-btn" id="stopBtn">停止</button>
    </div>

    <div id="status" class="status">未运行</div>
  </div>

  <script>
    const items = [
      { label: "左前", file: "zuoqian.mp3", icon: "↖" },
      { label: "右前", file: "youqian.mp3", icon: "↗" },
      { label: "左后", file: "zuohou.mp3", icon: "↙" },
      { label: "右后", file: "youhou.mp3", icon: "↘" }
    ];

    const phraseEl = document.getElementById("phrase");
    const imageEl = document.getElementById("image");
    const statusEl = document.getElementById("status");
    const intervalEl = document.getElementById("interval");

    let audioCtx = null;
    let audioUnlocked = false;
    let buffers = {};
    let running = false;
    let timer = null;
    let lastIndex = -1;
    let currentSource = null;

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function chooseNextItem() {
      let idx;
      do {
        idx = Math.floor(Math.random() * items.length);
      } while (items.length > 1 && idx === lastIndex);
      lastIndex = idx;
      return items[idx];
    }

    async function ensureAudioContext() {
      if (!audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) {
          throw new Error("当前浏览器不支持 Web Audio API");
        }
        audioCtx = new Ctx();
      }
      if (audioCtx.state !== "running") {
        await audioCtx.resume();
      }
    }

    async function unlockAudio() {
      await ensureAudioContext();

      // 用一个极短的静音缓冲来“解锁” iPhone/Safari 的音频上下文
      const buffer = audioCtx.createBuffer(1, 1, 22050);
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.connect(audioCtx.destination);
      source.start(0);

      audioUnlocked = true;
    }

    async function loadOneFile(file) {
      const resp = await fetch(file, { cache: "force-cache" });
      if (!resp.ok) {
        throw new Error(`加载失败: ${file}`);
      }
      const arr = await resp.arrayBuffer();
      return await audioCtx.decodeAudioData(arr.slice(0));
    }

    async function preloadAllAudio() {
      await ensureAudioContext();
      setStatus("正在加载音频...");

      for (const item of items) {
        buffers[item.label] = await loadOneFile(item.file);
      }

      setStatus("音频已加载，准备开始");
    }

    function stopCurrentSource() {
      if (currentSource) {
        try { currentSource.stop(0); } catch (e) {}
        try { currentSource.disconnect(); } catch (e) {}
        currentSource = null;
      }
    }

    function playBuffer(label) {
      const buffer = buffers[label];
      if (!buffer) throw new Error(`未找到音频缓冲: ${label}`);

      stopCurrentSource();

      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.connect(audioCtx.destination);
      source.start(0);
      currentSource = source;

      source.onended = () => {
        if (currentSource === source) {
          currentSource.disconnect();
          currentSource = null;
        }
      };

      return buffer.duration;
    }

    async function runOnce() {
      if (!running) return;

      try {
        await ensureAudioContext();

        const item = chooseNextItem();
        phraseEl.textContent = item.label;
        imageEl.textContent = item.icon;

        playBuffer(item.label);
      } catch (err) {
        console.error(err);
        setStatus("播放音频失败：请刷新页面后再次点击开始");
      }
    }

    async function startPrompt() {
      const intervalSeconds = parseFloat(intervalEl.value);
      if (isNaN(intervalSeconds) || intervalSeconds <= 0) {
        alert("请输入大于 0 的时间间隔");
        return;
      }

      try {
        stopPrompt(false);

        setStatus("启动中...");
        await ensureAudioContext();

        if (!audioUnlocked) {
          await unlockAudio();
        }

        if (Object.keys(buffers).length === 0) {
          await preloadAllAudio();
        }

        running = true;
        await runOnce();

        timer = setInterval(() => {
          runOnce();
        }, intervalSeconds * 1000);

        setStatus(`运行中：每 ${intervalSeconds} 秒输出一次`);
      } catch (err) {
        console.error(err);
        setStatus("启动失败：请确认4个 mp3 与 index.html 在同一目录");
      }
    }

    function stopPrompt(updateStatus = true) {
      running = false;
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
      stopCurrentSource();
      if (updateStatus) setStatus("已停止");
    }

    document.getElementById("startBtn").addEventListener("click", startPrompt);
    document.getElementById("stopBtn").addEventListener("click", () => stopPrompt(true));

    document.addEventListener("visibilitychange", async () => {
      if (document.hidden) {
        stopPrompt(true);
      } else if (audioCtx && audioCtx.state !== "running") {
        try { await audioCtx.resume(); } catch (e) {}
      }
    });
  </script>
</body>
</html>
